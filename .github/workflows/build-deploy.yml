name: Build & Deploy Kitchen Site

on:
  repository_dispatch:
    types: [vault-cooking-updated]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: triursa/second-brain-vault
          ref: ${{ github.event.client_payload.ref || 'master' }}
          path: _vault
          token: ${{ secrets.REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build site from vault
        run: |
          VAULT_DIR=$GITHUB_WORKSPACE/_vault/domains/cooking \
          OUTPUT_DIR=$GITHUB_WORKSPACE/_site \
          python3 scripts/build.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=kitchen --branch=main

      - name: Commit generated HTML to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -r _site/* ./
          git add recipes/ meal-plans/ grocery-lists/ knowledge-base/ index.html
          git diff --cached --quiet || git commit -m "Auto-rebuild from vault @ $(echo '${{ github.event.client_payload.ref || 'manual' }}' | cut -c1-7)"
          git push