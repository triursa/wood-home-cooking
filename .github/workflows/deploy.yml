name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch vault content (cooking domain)
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          mkdir -p _vault
          curl -L -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/triursa/second-brain-vault/tarball/master" \
            | tar -xz --strip-components=1 -C _vault \
              "triursa-second-brain-vault-*/domains/cooking"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VAULT_DIR: ${{ github.workspace }}/_vault/domains/cooking

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=kitchen-site --branch=main