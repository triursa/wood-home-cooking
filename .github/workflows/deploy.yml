name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vault content
        uses: actions/checkout@v4
        with:
          repository: kaleb-wood/second-brain-vault
          path: second-brain-vault
          token: ${{ secrets.VAULT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VAULT_DIR: ${{ github.workspace }}/second-brain-vault/domains/cooking

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: kitchen-site
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}